window:
  dynamic_title: true

font:
  normal:
    family: Iosevka
    style: Normal
  size: 9

draw_bold_text_with_bright_colors: false

cursor:
  style:
    blinking: On

mouse:
  hide_when_typing: true

colors:
  # Molokai color scheme
  # From https://github.com/mbadolato/iTerm2-Color-Schemes
  primary:
    background: '#121212'
    foreground: '#bbbbbb'
  normal:
    black: '#121212'
    blue: '#1080d0'
    cyan: '#43a8d0'
    green: '#98e123'
    magenta: '#8700ff'
    red: '#fa2573'
    white: '#bbbbbb'
    yellow: '#dfd460'
  bright:
    black: '#555555'
    blue: '#00afff'
    cyan: '#51ceff'
    green: '#b1e05f'
    magenta: '#af87ff'
    red: '#f6669d'
    white: '#ffffff'
    yellow: '#fff26d'
